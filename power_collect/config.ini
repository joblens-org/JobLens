# power_bench.sh configuration — copy to /etc/power_compare/config.env to override defaults
# Lines starting with # are comments

# RAPL base path override (auto-detected by default)
# RAPL_BASE=/sys/class/powercap/intel-rapl

# Calibration model: kavanagh2019 | linear_regression | none
CAL_MODEL=kavanagh2019

# Static overhead override (W) — if set, skip 60s calibration and use this fixed value
# STATIC_OVERRIDE=58

# IPMI tool override (auto-detected)
# IPMI_CMD=ipmitool dcmi power reading

# Load generation tool: stress-ng | none
# LOAD_TOOL=stress-ng

# Default test parameters
# DURATION=30
# ROUNDS=10

# Output language for column headers: en | zh
# LANG=en
