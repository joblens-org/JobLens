# JobLens Trigger (Flask) 集成测试配置
# 用途: 部署到 worker VM 的 /etc/JobLens/trigger/config.yaml
# 来源: 从 tests/integration/provisioning/joblens/deploy.sh:186-217 内联 YAML 提取
# 特点: 单节点测试 — 关闭所有远程组件 (服务注册/配置管理/规则引擎)

# ============================================================
# Trigger HTTP 服务
# ============================================================
service:
  host: 0.0.0.0                                  # 监听所有接口
  port: 7592                                     # Trigger REST API 端口

# ============================================================
# 服务注册 (C8 陷阱: 单节点测试必须 disabled)
# ============================================================
service_registry:
  enabled: false                                 # 单节点测试无需服务注册
  url: "http://localhost:8080"
  retry_interval: 10
  max_retries: 3
  heartbeat_interval: 1800

# ============================================================
# 配置管理器 — 单节点禁用
# ============================================================
config_manager:
  enabled: false                                 # 单节点无需远程配置管理
  config_file: "/etc/JobLens/config.yaml"
  etcd_priority: false

# ============================================================
# 规则引擎 — 单节点禁用
# ============================================================
rule_manager:
  enabled: false                                 # 单节点无需规则引擎
  etcd_priority: false

# ============================================================
# RPC 连接配置
# ============================================================
lens_config:
  rpc_timeout: 5.0                               # 与 C++ Agent 的 RPC 超时时间 (秒)

# ============================================================
# 邮件通知 — 集成测试不启用
# ============================================================
email_notifier:
  smtp_server: ""
  smtp_port: 587
  use_tls: true
  sender_email: ""
  recipients: []
