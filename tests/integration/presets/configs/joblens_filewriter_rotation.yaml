# JobLens C++ Agent 集成测试配置 — FileWriter 旋转 (Task 11)
# 用途: 部署到 worker VM 的 /etc/JobLens/config.yaml
# 特点: 启用追加模式 + 大小旋转 + max_files: 2 + 极小阈值 (256 bytes)
#       确保在集成测试中能快速触发旋转

# ============================================================
# 基础 Core 配置 (必填)
# ============================================================
lens_config:
  rpc_socket_path: /var/JobLens/rpc.sock
  lock_path: /var/JobLens/JobLens.lock
  max_collector_threads: 2
  log_level: debug

# ============================================================
# 作业注册表 (必填)
# ============================================================
job_registry_config:
  job_db_path: /var/JobLens/job.db
  auto_add_condorjob: true
  auto_add_slurmjob: true

# ============================================================
# HTCondor 作业监视器
# ============================================================
condor_job_watcher:
  auto_add_collectors:
    - cpumem_collector
  use_rules: false

# ============================================================
# Slurm 作业监视器
# ============================================================
slurm_job_watcher:
  auto_add_collectors:
    - cpumem_collector
  use_rules: false

# ============================================================
# 采集器配置
# ============================================================
collectors_config:
  enable_collector_perf: true
  perf_window_size: 1000
  default_freq: 1
  default_use_writers:
    - file_writer
  collectors:
    - name: cpumem_collector
      type: CPUMemCollector
      config: cpumem_collector_config

cpumem_collector_config:
  freq: 1
  use_writers:
    - file_writer

# ============================================================
# Writer 配置 — FileWriter 追加模式 + 旋转
# max_file_size_bytes: 256 → 极小阈值便于快速触发旋转
# max_files: 2 → 仅保留 .1 和 .2 两个旋转文件
# ============================================================
writers_config:
  enable_writer_perf: true
  buffer_capacity: 256
  writers:
    - name: file_writer
      type: FileWriter
      config: file_writer_config

file_writer_config:
  path: /var/log/joblens/output.log
  write_mode: append
  flush_on_shutdown: true
  enable_rotation: true
  max_file_size_bytes: 256
  max_files: 2

# ============================================================
# 单节点服务组件 (全部禁用)
# ============================================================
service_registry:
  enabled: false
  url: "http://localhost:8080"
  retry_interval: 10
  max_retries: 3
  heartbeat_interval: 1800

config_manager:
  enabled: false

rule_manager:
  enabled: false