name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  build:
    name: Build & Package (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: fedora, image: fedora:latest, preset: rpm-system-deps }
          - { name: el9,   image: almalinux:9,   preset: rpm-system-deps }
          - { name: fedora-static-epel, image: fedora:latest, preset: rpm-static-epel }
      fail-fast: false
    container:
      image: ${{ matrix.target.image }}

    steps:      
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          dnf install -y sudo
          bash scripts/install-deps.sh
          dnf install -y rpm-build

      - name: Diagnose build environment versions
        run: |
          echo "=== 容器信息 ==="
          cat /etc/os-release | head -5

          echo ""
          echo "=== glibc 版本 ==="
          ldd --version | head -1
          strings /lib64/libc.so.6 | grep 'GLIBC_' | sort -V | tail -5

          echo ""
          echo "=== GCC/libstdc++ 版本 ==="
          gcc --version | head -1
          strings /lib64/libstdc++.so.6 | grep 'GLIBCXX_' | sort -V | tail -5

          echo ""
          echo "=== 关键包版本 ==="
          rpm -q glibc gcc gcc-c++ fmt-devel spdlog-devel yaml-cpp-devel boost-devel 2>/dev/null || true

          echo ""
          echo "=== EPEL 仓库 URL ==="
          grep -r 'baseurl\|mirrorlist' /etc/yum.repos.d/*epel* 2>/dev/null | head -20 || echo "无 EPEL 仓库配置"

          echo ""
          echo "=== 所有已启用的 DNF 仓库 ==="
          dnf repolist --enabled 2>/dev/null || microdnf repolist --enabled 2>/dev/null || true

      - name: Configure & Build (CMakePresets)
        run: |
          cmake --preset ${{ matrix.target.preset }} -DCPACK_RPM_PACKAGE_RELEASE="1${{ matrix.target.dist }}"
          cmake --build --preset ${{ matrix.target.preset }}

      - name: Diagnose binary dependencies
        run: |
          echo "=== 二进制动态链接 ==="
          ldd build/JobLens | sort

          echo ""
          echo "=== 二进制需要的 glibc 符号版本 ==="
          objdump -T build/JobLens | grep -oP 'GLIBC_\S+' | sort -Vu

          echo ""
          echo "=== 二进制需要的 libstdc++ 符号版本 ==="
          objdump -T build/JobLens | grep -oP 'GLIBCXX_\S+' | sort -Vu

          echo ""
          echo "=== 二进制需要的第三方库 SONAME ==="
          objdump -p build/JobLens | grep NEEDED | sort -u

      - name: Package (CPack TGZ + RPM)
        run: |
          cpack --preset ${{ matrix.target.preset }}

      # ════════════════════════════════════════════════════════
      # TGZ 验证（仅 rpm-system-deps 产出 TGZ）
      # ════════════════════════════════════════════════════════
      - name: Verify TGZ contents
        if: matrix.target.preset == 'rpm-system-deps'
        run: |
          echo "=== TGZ 包列表 ==="
          TGZ=$(ls build/joblens-*-Linux-x86_64.tar.gz | head -1)
          tar -tzf "$TGZ" | sort

          echo ""
          echo "=== TGZ 关键产物检查 ==="
          tar -tzf "$TGZ" | grep -q 'bin/JobLens$' && echo "✓ JobLens 二进制" || { echo "✗ 缺少 JobLens"; exit 1; }
          tar -tzf "$TGZ" | grep -qE 'lib[0-9]*/joblens/bpf_obj/[^/]*\.bpf\.o$' && echo "✓ eBPF 对象文件" || echo "⚠ 未找到 bpf_obj"
          tar -tzf "$TGZ" | grep -q 'etc/JobLens/config.yaml$' && echo "✓ 默认配置文件" || { echo "✗ 缺少 config.yaml"; exit 1; }
          tar -tzf "$TGZ" | grep -q 'systemd/system/joblens.service$' && echo "✓ systemd 服务单元" || echo "⚠ 未找到 joblens.service"

          echo ""
          echo "=== TGZ 系统依赖模式专项检查 ==="
          # 系统依赖模式：不应捆绑任何 .so，运行时依赖系统包管理器提供
          ! tar -tzf "$TGZ" | grep -qE 'lib[0-9]*/joblens/[^/]*\.so' && echo "✓ 未捆绑 .so (系统依赖模式)" || { echo "✗ 不应包含 .so"; exit 1; }
          echo "TGZ 大小: $(ls -lh "$TGZ" | awk '{print $5}')"

      # ════════════════════════════════════════════════════════
      # RPM 通用检查（两种模式共用）
      # ════════════════════════════════════════════════════════
      - name: Verify RPM (common checks)
        run: |
          echo "=== RPM 包信息 ==="
          RPM=$(ls build/joblens-*.rpm 2>/dev/null | head -1)
          if [ -z "$RPM" ]; then
            echo "✗ 未找到 RPM 包"
            exit 1
          fi

          echo "文件列表:"
          rpm -qpl "$RPM"

          echo ""
          echo "=== RPM 通用产物检查 ==="
          rpm -qpl "$RPM" | grep -q '/bin/JobLens$' && echo "✓ JobLens 二进制" || { echo "✗ 缺少 JobLens"; exit 1; }
          rpm -qpl "$RPM" | grep -qE '/lib[0-9]*/joblens/bpf_obj/[^/]*\.bpf\.o$' && echo "✓ eBPF 对象文件" || echo "⚠ 未找到 bpf_obj"
          rpm -qpl "$RPM" | grep -q '/etc/JobLens/config.yaml$' && echo "✓ 默认配置文件" || { echo "✗ 缺少 config.yaml"; exit 1; }
          rpm -qpl "$RPM" | grep -q '/systemd/system/joblens.service$' && echo "✓ systemd 服务单元" || echo "⚠ 未找到 joblens.service"

          echo ""
          echo "=== RPM 全部运行时依赖 ==="
          rpm -qp --requires "$RPM" | sort

          echo ""
          echo "=== RPM 维护脚本 ==="
          rpm -qp --scripts "$RPM"

          echo ""
          echo "RPM 大小: $(ls -lh "$RPM" | awk '{print $5}')"

          # 将 RPM 路径写入 GITHUB_ENV 供后续模式专项步骤使用
          echo "RPM_FILE=${RPM}" >> "${GITHUB_ENV}"

      # ════════════════════════════════════════════════════════
      # RPM 系统依赖模式专项检查
      # ════════════════════════════════════════════════════════
      - name: Verify RPM (system-deps mode)
        if: matrix.target.preset == 'rpm-system-deps'
        run: |
          RPM="${RPM_FILE}"
          echo "=== 系统依赖模式专项检查 ==="

          # 1) 不应捆绑 .so — 所有动态库由系统 RPM 包管理器声明
          ! rpm -qpl "$RPM" | grep -qE '/lib[0-9]*/joblens/[^/]*\.so' && echo "✓ 未捆绑 .so (运行时依赖系统包管理器)" || { echo "✗ 不应包含 .so"; exit 1; }

          # 2) RPM Requires 必须声明完整系统依赖（含 EPEL 来源的 leveldb / xxhash）
          REQS=$(rpm -qp --requires "$RPM")
          echo "   检查 Requires 中包含 leveldb..."
          echo "$REQS" | grep -q 'leveldb' && echo "   ✓ Requires 声明 leveldb" || { echo "   ✗ 缺少 leveldb 依赖声明"; exit 1; }
          echo "   检查 Requires 中包含 xxhash..."
          echo "$REQS" | grep -q 'xxhash' && echo "   ✓ Requires 声明 xxhash" || { echo "   ✗ 缺少 xxhash 依赖声明"; exit 1; }

      # ════════════════════════════════════════════════════════
      # RPM 自包含模式专项检查
      # ════════════════════════════════════════════════════════
      - name: Verify RPM (static-epel mode)
        if: matrix.target.preset == 'rpm-static-epel'
        run: |
          RPM="${RPM_FILE}"
          echo "=== 自包含模式专项检查 ==="

          # 1) 必须捆绑 .so — collect_libs.sh 收集的非系统库应打包进 RPM
          rpm -qpl "$RPM" | grep -qE '/lib[0-9]*/joblens/[^/]*\.so' && echo "✓ 已捆绑 .so (自包含离线部署)" || { echo "✗ 缺少捆绑的 .so"; exit 1; }

          # 2) RPM Requires 应仅包含 systemd — EPEL 库已随 .so 捆绑（或静态链接），不应声明运行时依赖
          REQS=$(rpm -qp --requires "$RPM")
          echo "   检查 Requires 中不应包含 leveldb (已捆绑 .so 或静态链接)..."
          echo "$REQS" | grep -q 'leveldb' && { echo "   ✗ leveldb 仍被 RPM 声明为依赖 (检查 CPACK_RPM_PACKAGE_AUTOREQ 是否关闭)"; exit 1; } || echo "   ✓ 未声明 leveldb 依赖"
          echo "   检查 Requires 中不应包含 xxhash (已捆绑 .so 或静态链接)..."
          echo "$REQS" | grep -q 'xxhash' && { echo "   ✗ xxhash 仍被 RPM 声明为依赖 (检查 CPACK_RPM_PACKAGE_AUTOREQ 是否关闭)"; exit 1; } || echo "   ✓ 未声明 xxhash 依赖"

          # 3) 确认捆绑的 .so 列表（信息输出，非硬性检查）
          echo ""
          echo "=== 捆绑的 .so 列表 ==="
          rpm -qpl "$RPM" | grep -E '/lib[0-9]*/joblens/[^/]*\.so' | while read so; do
            echo "   $(basename "$so")"
          done

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: joblens-core-rpm-${{ matrix.target.name }}
          path: build/joblens-*.rpm

      - name: Upload TGZ artifact
        if: matrix.target.preset == 'rpm-system-deps'
        uses: actions/upload-artifact@v4
        with:
          name: joblens-core-tgz-${{ matrix.target.name }}
          path: build/joblens-*-Linux-x86_64.tar.gz



  trigger-rpm:
    name: Trigger RPM Build
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          dnf install -y --setopt=tsflags=nodocs \
            rpm-build rpmdevtools python3 python3-devel \
            python3-setuptools python3-wheel python3-pip \
            pyproject-rpm-macros systemd-rpm-macros

      - name: Build RPM
        run: bash scripts/build-trigger-rpm.sh --install-deps

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: joblens-trigger-rpm
          path: ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm
