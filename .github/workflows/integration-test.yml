---
# JobLens 集成测试 — KVM/Vagrant 双节点端到端测试
#
# 触发条件:
#   - workflow_dispatch: 手动触发 (可选传入预构建 RPM 路径)
#   - pull_request: 对 main/develop 分支路径过滤触发
#
# 运行环境:
#   - 自托管 runner, 标签: [self-hosted, kvm, almalinux9]
#   - 需要 KVM + libvirt + vagrant-libvirt 支持
#
# 拓扑:
#   - VM1 controller (192.168.56.10): 调度控制服务
#   - VM2 worker     (192.168.56.20): Worker + JobLens
#
# 超时: 45 分钟 (构建 + VM 启动 + 部署 + 35 个测试)
# 清理: 无论测试成功/失败, VM 都会被销毁

name: Integration Test

# yamllint disable rule:truthy
on:
  workflow_dispatch:
    inputs:
      joblens_rpm_path:
        description: >-
          预构建 RPM 目录路径 (含 joblens-*.rpm 和 joblens-trigger-*.rpm)
        required: false
        type: string
        default: ''
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'tests/integration/**'
      - '.github/workflows/integration-test.yml'

jobs:
  integration-test:
    name: Integration Test (KVM + Vagrant)
    runs-on: [self-hosted, kvm, almalinux9]
    timeout-minutes: 45

    # 环境变量: KEEP_VMS=1 保留 VM (调试用), 默认销毁
    env:
      KEEP_VMS: ${{ vars.KEEP_VMS || '0' }}

    steps:
      # ────────────────────────────────────────────────────────
      # Step 1: 检出代码 (含 submodules)
      # ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ────────────────────────────────────────────────────────
      # Step 2: 验证 KVM/libvirt/vagrant-libvirt 可用
      # ────────────────────────────────────────────────────────
      - name: 验证 KVM + libvirt + vagrant-libvirt 环境
        run: |
          echo "=== KVM 内核模块 ==="
          if ! lsmod | grep -q kvm; then
            echo "FATAL: KVM 模块未加载"
            echo "  请执行 modprobe kvm kvm_intel 或 kvm_amd"
            exit 1
          fi
          echo "  PASS: KVM 模块已加载"

          echo ""
          echo "=== libvirt 守护进程 ==="
          if ! systemctl is-active --quiet libvirtd; then
            echo "FATAL: libvirtd 未运行"
            exit 1
          fi
          echo "  PASS: libvirtd 运行中"

          echo ""
          echo "=== Vagrant 版本 ==="
          vagrant --version

          echo ""
          echo "=== vagrant-libvirt 插件 ==="
          if ! vagrant plugin list 2>/dev/null | grep -q libvirt; then
            echo "FATAL: vagrant-libvirt 插件未安装"
            exit 1
          fi
          echo "  PASS: vagrant-libvirt 已安装"

          echo ""
          echo "=== bpftool ==="
          bpftool version 2>/dev/null \
            || echo "  (VM 内 common.sh 会安装 bpftool)"

      # ────────────────────────────────────────────────────────
      # Step 3: 准备 RPM 包
      #   有 JOBLENS_RPM_PATH 输入 → 复制预构建 RPM
      #   否则 → 从源码编译 Core + Trigger RPM
      #   统一输出到 tests/integration/rpms/
      # ────────────────────────────────────────────────────────
      - name: 准备 RPM 包 (构建或复制预构建)
        run: |
          mkdir -p tests/integration/rpms
          RPM_PATH="${{ github.event.inputs.joblens_rpm_path }}"

          if [ -n "${RPM_PATH}" ] && [ -d "${RPM_PATH}" ]; then
            echo "使用预构建 RPM: ${RPM_PATH}"
            cp -v "${RPM_PATH}"/joblens-[0-9]*.rpm \
              tests/integration/rpms/ 2>/dev/null || true
            cp -v "${RPM_PATH}"/joblens-trigger-*.rpm \
              tests/integration/rpms/ 2>/dev/null || true
          else
            echo "从源码构建 JobLens Core RPM..."
            bash scripts/install-deps.sh
            cmake --preset rpm-system-deps
            cmake --build --preset rpm-system-deps
            cpack --preset rpm-system-deps
            cp -v build/joblens-[0-9]*.rpm tests/integration/rpms/
            echo "  Core RPM 构建完成"

            echo ""
            echo "构建 JobLens Trigger RPM..."
            bash scripts/build-trigger-rpm.sh --install-deps
            cp -v ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm \
              tests/integration/rpms/
            echo "  Trigger RPM 构建完成"
          fi

          echo ""
          echo "=== RPM 包清单 ==="
          ls -lh tests/integration/rpms/

          # 验证至少有一个 trigger RPM
          TRIGGER_COUNT=$(ls tests/integration/rpms/ \
            joblens-trigger-*.rpm 2>/dev/null | wc -l)
          if [ "${TRIGGER_COUNT}" -eq 0 ]; then
            echo "FATAL: 缺少 joblens-trigger RPM 文件"
            exit 1
          fi

      # ────────────────────────────────────────────────────────
      # Step 4: 启动 VM (Vagrantfile 在 tests/integration/)
      # ────────────────────────────────────────────────────────
      - name: 启动 VM (vagrant up)
        working-directory: tests/integration
        run: |
          echo "=== 检查 Vagrant box ==="
          vagrant box list | grep almalinux \
            || echo "  (首次运行将自动下载 box)"

          echo ""
          echo "=== 启动 VM ==="
          vagrant up --provider=libvirt

          echo ""
          echo "=== VM 状态 ==="
          vagrant status

      # ────────────────────────────────────────────────────────
      # Step 5: 部署 controller (VM1)
      #   顺序: common.sh → HTCondor → Slurm 控制器
      #   Slurm 控制器生成 munge key 供 worker 使用
      # ────────────────────────────────────────────────────────
      - name: Provision controller (common + HTCondor + Slurm)
        working-directory: tests/integration
        run: |
          echo "=== Controller 部署: VM1 (192.168.56.10) ==="

          echo ""
          echo "--- [1/3] 通用初始化 ---"
          vagrant ssh controller -c \
            "sudo bash /vagrant/provisioning/common.sh controller" \
            || { echo "FATAL: common.sh controller 失败"; exit 1; }

          echo ""
          echo "--- [2/3] HTCondor 控制器 ---"
          vagrant ssh controller -c \
            "sudo bash /vagrant/provisioning/condor/controller.sh" \
            || { echo "FATAL: condor/controller.sh 失败"; exit 1; }

          echo ""
          echo "--- [3/3] Slurm 控制器 ---"
          vagrant ssh controller -c \
            "sudo bash /vagrant/provisioning/slurm/controller.sh" \
            || { echo "FATAL: slurm/controller.sh 失败"; exit 1; }

          echo ""
          echo "  PASS: Controller 部署完成"

      # ────────────────────────────────────────────────────────
      # Step 6: 部署 worker (VM2)
      #   顺序: common.sh → HTCondor → Slurm → JobLens
      #   Slurm worker 依赖 Step 5 生成的 munge key
      # ────────────────────────────────────────────────────────
      - name: Provision worker (common + HTCondor + Slurm + JobLens)
        working-directory: tests/integration
        run: |
          echo "=== Worker 部署: VM2 (192.168.56.20) ==="

          echo ""
          echo "--- [1/4] 通用初始化 ---"
          vagrant ssh worker -c \
            "sudo bash /vagrant/provisioning/common.sh worker" \
            || { echo "FATAL: common.sh worker 失败"; exit 1; }

          echo ""
          echo "--- [2/4] HTCondor Worker ---"
          vagrant ssh worker -c \
            "sudo bash /vagrant/provisioning/condor/worker.sh" \
            || { echo "FATAL: condor/worker.sh 失败"; exit 1; }

          echo ""
          echo "--- [3/4] Slurm Worker ---"
          vagrant ssh worker -c \
            "sudo bash /vagrant/provisioning/slurm/worker.sh" \
            || { echo "FATAL: slurm/worker.sh 失败"; exit 1; }

          echo ""
          echo "--- [4/4] JobLens 部署 ---"
          vagrant ssh worker -c \
            "sudo bash /vagrant/provisioning/joblens/deploy.sh" \
            || { echo "FATAL: joblens/deploy.sh 失败"; exit 1; }

          echo ""
          echo "  PASS: Worker 部署完成"

      # ────────────────────────────────────────────────────────
      # Step 7: 安装 Python 依赖并运行 pytest
      # ────────────────────────────────────────────────────────
      - name: 安装 Python 依赖并运行 pytest
        working-directory: tests/integration
        run: |
          echo "=== 创建 Python 虚拟环境 ==="
          python3 -m venv .venv

          echo ""
          echo "=== 安装依赖 ==="
          .venv/bin/pip install --quiet -r requirements.txt

          echo ""
          echo "=== 运行集成测试 ==="
          .venv/bin/pytest -v --tb=short \
            --junitxml=test-results.xml \
            --no-header \
            2>&1 | tee pytest.log

          echo ""
          echo "=== 测试概要 ==="
          .venv/bin/pytest --collect-only -q 2>/dev/null || true

      # ────────────────────────────────────────────────────────
      # Step 8: 上传测试结果 (总是执行)
      # ────────────────────────────────────────────────────────
      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            tests/integration/test-results.xml
            tests/integration/pytest.log
          retention-days: 7

      # ────────────────────────────────────────────────────────
      # Step 9: 清理 VM (总是执行)
      #   KEEP_VMS=1 时保留 VM 供调试
      # ────────────────────────────────────────────────────────
      - name: 清理 VM
        if: always()
        working-directory: tests/integration
        run: |
          echo "=== 收集诊断信息 ==="
          vagrant status 2>/dev/null \
            || echo "  (vagrant 不可用)"

          if [ "${KEEP_VMS}" = "1" ]; then
            echo ""
            echo "=== KEEP_VMS=1, 保留 VM ==="
            echo "  销毁: cd tests/integration && vagrant destroy -f"
            vagrant status
            exit 0
          fi

          echo ""
          echo "=== 销毁 VM ==="
          vagrant destroy -f 2>/dev/null \
            || echo "  WARNING: vagrant destroy 失败"
          echo "  VM 已销毁"
