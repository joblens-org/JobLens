---
# JobLens 集成测试 — GitHub-hosted KVM 双节点端到端测试
#
# 触发条件:
#   - workflow_dispatch: 手动触发
#   - pull_request: 对 main/develop/feat/* 分支路径过滤触发
#
# 运行环境:
#   - GitHub-hosted ubuntu-latest (x86-64, KVM 嵌套虚拟化)
#   - Guest VM: AlmaLinux 9 (通过 Vagrant libvirt)
#
# 构建:
#   - Core RPM + Trigger RPM 使用 almalinux:9 Docker 容器构建
#   - 确保 RPM 依赖与目标 VM 的库版本完全匹配
#
# 拓扑:
#   - VM1 controller (192.168.56.10): 调度控制服务
#   - VM2 worker     (192.168.56.20): Worker + JobLens
#
# 超时: 60 分钟 (首次 box 下载较慢)

name: Integration Test

# yamllint disable rule:truthy
on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'tests/integration/**'
      - '.github/workflows/integration-test.yml'
  push:
    branches: [feat/*]

jobs:
  integration-test:
    name: Integration Test (KVM + Vagrant)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      KEEP_VMS: ${{ vars.KEEP_VMS || '0' }}
      # Vagrant 默认使用 libvirt provider
      VAGRANT_DEFAULT_PROVIDER: libvirt

    steps:
      # ─── Step 0: 启用 KVM 权限 ───────────────────────────────
      - name: 启用 KVM 设备权限
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666",' \
            'OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm
          echo "PASS: /dev/kvm 可用"

      # ─── Step 1: 安装宿主依赖 ────────────────────────────────
      - name: 安装宿主依赖 (libvirt + Vagrant + 权限修复)
        run: |
          echo "=== 安装 libvirt + KVM ==="
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-kvm libvirt-daemon-system libvirt-clients \
            libvirt-dev virtinst bridge-utils cpu-checker \
            qemu-utils dnsmasq-base

          echo ""
          echo "=== 配置 libvirt socket 权限 (CI 环境) ==="
          sudo systemctl enable --now libvirtd 2>/dev/null || true
          sudo systemctl start libvirtd 2>/dev/null || true
          sleep 2

          # 直接 chmod socket — CI 临时环境, 不需要持久化
          for sock in /var/run/libvirt/libvirt-sock*; do
            if [ -e "$sock" ]; then
              sudo chmod 777 "$sock"
              ls -la "$sock"
            fi
          done

          # 如果上面没有 socket, 尝试重启后再次 chmod
          if ! ls /var/run/libvirt/libvirt-sock >/dev/null 2>&1; then
            sudo systemctl restart libvirtd
            sleep 3
            for sock in /var/run/libvirt/libvirt-sock*; do
              if [ -e "$sock" ]; then
                sudo chmod 777 "$sock" && ls -la "$sock"
              fi
            done
          fi

          echo ""
          echo "=== 验证 libvirt 连接 ==="
          virsh -c qemu:///system list 2>&1 \
            || sudo virsh -c qemu:///system list 2>&1

          echo ""
          echo "=== 安装 Vagrant ==="
          curl -fsSL https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq
          sudo apt-get install -y vagrant
          vagrant --version

          echo ""
          echo "=== 安装 vagrant-libvirt 插件 ==="
          sudo apt-get install -y ruby-dev pkg-config
          vagrant plugin install vagrant-libvirt
          vagrant plugin list

          echo ""
          echo "=== 安装 RPM 构建工具 ==="
          sudo apt-get install -y rpm

      # ─── Step 2: 检出代码 ────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ─── Step 3: 构建 RPM 包 (AlmaLinux 9 容器内) ───────────
      - name: 构建 JobLens RPM (AlmaLinux 9 容器)
        run: |
          echo "=== 在 AlmaLinux 9 容器内构建 Core RPM ==="
          docker run --rm --privileged \
            -v "$(pwd)":/workspace -w /workspace \
            almalinux:9 bash -c "
              set -euo pipefail
              echo '安装构建依赖...'
              dnf install -y --setopt=tsflags=nodocs epel-release
              dnf config-manager --set-enabled crb 2>/dev/null || true
              dnf install -y --setopt=tsflags=nodocs \
                git clang cmake ninja-build pkgconfig \
                libbpf-devel elfutils-libelf-devel leveldb-devel \
                libnl3-devel openssl-devel zlib-devel lua-devel \
                libcurl-devel cyrus-sasl-devel libzstd-devel lz4-devel \
                librdkafka-devel boost-devel xxhash-devel \
                spdlog-devel yaml-cpp-devel fmt-devel \
                nlohmann-json-devel bpftool rpm-build

              echo '安装 sol2 + date (从源码)...'
              # sol2 — AlmaLinux 9 仓库无此包
              curl -fsSL https://github.com/ThePhD/sol2/archive/refs/tags/v3.5.0.tar.gz \
                -o /tmp/sol2.tar.gz
              tar -xzf /tmp/sol2.tar.gz -C /tmp
              cp -r /tmp/sol2-3.5.0/include/sol /usr/local/include/

              # howardhinnant-date — AlmaLinux 9 无 date-devel
              curl -fsSL \
                https://github.com/HowardHinnant/date/archive/refs/tags/v3.0.1.tar.gz \
                -o /tmp/date.tar.gz
              tar -xzf /tmp/date.tar.gz -C /tmp
              cd /tmp/date-3.0.1
              cmake -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release -DBUILD_TZ_LIB=ON -DUSE_SYSTEM_TZ_DB=ON
              cmake --build build
              cmake --install build
              cd /workspace

              echo '构建 JobLens...'
              cmake --preset rpm-system-deps
              cmake --build --preset rpm-system-deps
              cpack --preset rpm-system-deps

              echo '复制 RPM 到主机目录...'
              mkdir -p tests/integration/rpms
              cp build/joblens-[0-9]*.rpm tests/integration/rpms/
              ls -lh tests/integration/rpms/
            "

      - name: 构建 Trigger RPM (AlmaLinux 9 容器)
        run: |
          echo "=== 在 AlmaLinux 9 容器内构建 Trigger RPM ==="
          docker run --rm \
            -v "$(pwd)":/workspace -w /workspace \
            almalinux:9 bash -c "
              set -euo pipefail
              dnf install -y --setopt=tsflags=nodocs epel-release
              dnf config-manager --set-enabled crb 2>/dev/null || true
              dnf install -y --setopt=tsflags=nodocs \
                rpm-build python3 python3-devel \
                python3-setuptools python3-wheel python3-pip \
                pyproject-rpm-macros systemd-rpm-macros git
              bash scripts/build-trigger-rpm.sh
              mkdir -p tests/integration/rpms
              cp ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm \
                tests/integration/rpms/
            "

          echo ""
          echo "=== RPM 包清单 ==="
          ls -lh tests/integration/rpms/

      # ─── Step 4: 启动 VM ─────────────────────────────────────
      - name: 启动 VM (vagrant up)
        working-directory: tests/integration
        run: |
          echo "=== 预下载 Vagrant box ==="
          vagrant box add almalinux/9 --provider=libvirt 2>/dev/null \
            || echo "  (box 将在 vagrant up 时自动下载)"

          echo ""
          echo "=== 启动 VM ==="
          vagrant up --provider=libvirt

          echo ""
          echo "=== VM 状态 ==="
          vagrant status

      # ─── Step 5: 部署 controller ──────────────────────────────
      - name: Provision Controller (VM1)
        working-directory: tests/integration
        run: |
          echo "=== Controller: common.sh ==="
          vagrant ssh controller -c \
            "sudo bash /vagrant/provisioning/common.sh controller" \
            || { echo "FATAL: common.sh 失败"; exit 1; }

          echo "=== Controller: HTCondor ==="
          vagrant ssh controller -c \
            "sudo bash /vagrant/provisioning/condor/controller.sh" \
            || { echo "FATAL: condor 失败"; exit 1; }

          echo "=== Controller: Slurm ==="
          vagrant ssh controller -c \
            "sudo bash /vagrant/provisioning/slurm/controller.sh" \
            || { echo "FATAL: slurm 失败"; exit 1; }

          echo "PASS: Controller 部署完成"

          echo ""
          echo "=== 提取 Slurm 运行时文件 (controller → host) ==="
          mkdir -p .runtime/slurm
          vagrant ssh controller -c "sudo cat /etc/munge/munge.key" > .runtime/slurm/munge.key
          vagrant ssh controller -c "sudo cat /etc/slurm/slurm.conf" > .runtime/slurm/slurm.conf
          echo "   munge key + slurm.conf 已提取到 .runtime/slurm/"

      # ─── Step 6: 部署 worker ──────────────────────────────────
      - name: Provision Worker (VM2)
        working-directory: tests/integration
        run: |
          echo "=== Worker: common.sh ==="
          vagrant ssh worker -c \
            "sudo bash /vagrant/provisioning/common.sh worker" \
            || { echo "FATAL: common.sh 失败"; exit 1; }

          echo "=== Worker: HTCondor ==="
          vagrant ssh worker -c \
            "sudo bash /vagrant/provisioning/condor/worker.sh" \
            || { echo "FATAL: condor 失败"; exit 1; }

          echo "=== Worker: 注入 Slurm 运行时文件 (host → worker) ==="
          vagrant ssh worker -c \
            "sudo mkdir -p /var/tmp/slurm_runtime" \
            || { echo "FATAL: 创建运行时目录失败"; exit 1; }
          vagrant ssh worker -c \
            "sudo tee /var/tmp/slurm_runtime/munge.key" < .runtime/slurm/munge.key \
            > /dev/null || { echo "FATAL: 注入 munge key 失败"; exit 1; }
          vagrant ssh worker -c \
            "sudo tee /var/tmp/slurm_runtime/slurm.conf" < .runtime/slurm/slurm.conf \
            > /dev/null || { echo "FATAL: 注入 slurm.conf 失败"; exit 1; }
          echo "   munge key + slurm.conf 已注入 worker"

          echo "=== Worker: Slurm ==="
          vagrant ssh worker -c \
            "sudo bash /vagrant/provisioning/slurm/worker.sh" \
            || { echo "FATAL: slurm 失败"; exit 1; }

          echo "=== Worker: JobLens ==="
          vagrant ssh worker -c \
            "sudo bash /vagrant/provisioning/joblens/deploy.sh" \
            || { echo "FATAL: joblens 失败"; exit 1; }

          echo "PASS: Worker 部署完成"

      # ─── Step 7: 运行测试 ─────────────────────────────────────
      - name: 运行集成测试 (pytest)
        working-directory: tests/integration
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt
          .venv/bin/pytest -v --tb=short \
            --junitxml=test-results.xml \
            2>&1 | tee pytest.log

      # ─── Step 8: 上传结果 (总是执行) ──────────────────────────
      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            tests/integration/test-results.xml
            tests/integration/pytest.log
          retention-days: 7

      # ─── Step 9: 清理 VM (总是执行) ───────────────────────────
      - name: 清理 VM
        if: always()
        working-directory: tests/integration
        run: |
          echo "=== 诊断 ==="
          vagrant status 2>/dev/null || echo "  (vagrant 不可用)"

          if [ "${KEEP_VMS}" = "1" ]; then
            echo "KEEP_VMS=1, 保留 VM 供调试"
            vagrant status
            exit 0
          fi

          echo "=== 销毁 VM ==="
          vagrant destroy -f 2>/dev/null \
            || echo "  WARNING: 销毁失败"
          echo "VM 已清理"
