name: Release

# ============================================================
# JobLens 自动发布工作流
# ============================================================
# 触发条件:
#   推送 ver-X.Y.Z 格式的 tag → 自动构建并发布 GitHub Release
#
# 版本体系（两套独立版本号）:
#   - JobLens 核心版本: CMakeLists.txt 中的 project(VERSION X.Y.Z)
#   - Trigger 版本:     trigger/version.py 中的 __version__
#   - Tag 版本:         仅作发布触发器，必须与 CMakeLists.txt 一致
#
# 发布产物:
#   - JobLens-X.Y.Z-Linux.tar.gz   (C++ 核心通用包)
#   - joblens-X.Y.Z-*.rpm          (C++ 核心 RPM)
#   - joblens-trigger-A.B.C-*.rpm  (Trigger 服务 RPM，版本独立)
#   - SHA256SUMS.txt               (完整性校验)
# ============================================================

on:
  push:
    tags:
      - 'ver-[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      draft:
        description: '创建为 Draft Release（发布前需人工审核）'
        type: boolean
        default: false

permissions:
  contents: write  # 创建 GitHub Release 所需权限

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 200M

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1: 版本准备与校验
  #   从 git tag 提取版本号，校验与 CMakeLists.txt 一致
  # ════════════════════════════════════════════════════════════
  prepare:
    name: 版本校验
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 提取并校验版本号
        id: version
        run: |
          # 从 tag 提取版本号（去掉 ver- 前缀）
          # ver-0.1.0 → 0.1.0
          TAG_VERSION="${GITHUB_REF_NAME#ver-}"
          echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"

          # 从 CMakeLists.txt 提取 JobLens 核心版本号
          CMAKE_VERSION=$(grep -oP 'project\(JobLens\s+VERSION\s+\K[\d.]+' CMakeLists.txt)

          echo "Tag 版本 (JobLens 核心): ${TAG_VERSION}"
          echo "CMakeLists.txt 版本:       ${CMAKE_VERSION}"

          # 校验：tag 版本必须与 CMakeLists.txt 一致
          if [ "${TAG_VERSION}" != "${CMAKE_VERSION}" ]; then
            echo "::error::Tag 版本 (${TAG_VERSION}) 与 CMakeLists.txt (${CMAKE_VERSION}) 不匹配！"
            echo "::error::发布前请确保 CMakeLists.txt 中的 VERSION 与 Tag 一致"
            exit 1
          fi
          echo "✅ 版本校验通过"

  # ════════════════════════════════════════════════════════════
  # Job 2: 构建 C++ 核心 RPM + TGZ
  #   复用 CI 预设 rpm-system-deps
  # ════════════════════════════════════════════════════════════
  build-core:
    name: Build Core (${{ matrix.target.name }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: fedora, image: fedora:latest }
          - { name: el9,   image: almalinux:9 }
      fail-fast: false
    container:
      image: ${{ matrix.target.image }}
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          dnf install -y sudo
          bash scripts/install-deps.sh
          dnf install -y rpm-build

      - name: Configure
        run: |
          DIST_TAG=$(rpm -E '%{?dist}' 2>/dev/null || echo '')
          echo "Dist tag: ${DIST_TAG}"
          cmake --preset rpm-system-deps -DCPACK_RPM_PACKAGE_RELEASE="1${DIST_TAG}"

      - name: Build
        run: cmake --build --preset rpm-system-deps

      - name: Package (CPack TGZ + RPM)
        run: cpack --preset rpm-system-deps

      - name: Verify core artifacts
        run: |
          set -e
          echo "=== TGZ ==="
          ls -lh build/joblens-*-Linux-x86_64.tar.gz
          echo "=== RPM ==="
          ls -lh build/joblens-*.rpm

          tar -tzf build/joblens-*-Linux-x86_64.tar.gz | grep -q 'bin/JobLens$' \
            && echo "OK: JobLens binary" \
            || { echo "FAIL: missing JobLens binary"; exit 1; }

          tar -tzf build/joblens-*-Linux-x86_64.tar.gz | grep -q 'etc/JobLens/config.yaml$' \
            && echo "OK: default config" \
            || { echo "FAIL: missing config.yaml"; exit 1; }

          echo "Core build completed"

      - name: Upload core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-packages-${{ matrix.target.name }}
          path: |
            build/joblens-*-Linux-x86_64.tar.gz
            build/joblens-*.rpm
          if-no-files-found: error
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # Job 3: 构建 Python Trigger RPM
  #   在 fedora 容器中原生构建，版本号来自 trigger/version.py
  #   Trigger 拥有独立的版本号，不与 JobLens 核心同步
  # ════════════════════════════════════════════════════════════
  build-trigger:
    name: 构建 Trigger RPM
    needs: prepare
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 RPM 构建工具
        run: |
          dnf install -y --setopt=tsflags=nodocs \
            rpm-build rpmdevtools python3 python3-devel \
            python3-setuptools python3-wheel python3-pip \
            pyproject-rpm-macros systemd-rpm-macros

      - name: 确认 Trigger 版本号
        run: |
          echo "Trigger 版本 (来自 trigger/version.py):"
          python3 -c "import runpy; ns=runpy.run_path('trigger/version.py'); print(ns['__version__'])"

      - name: 构建 Trigger RPM
        run: bash scripts/build-trigger-rpm.sh --install-deps

      - name: 验证 Trigger 产物
        run: |
          RPM_FILE=$(ls ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm 2>/dev/null | head -1)
          if [ -z "$RPM_FILE" ]; then
            echo "❌ 未找到 Trigger RPM 产物"
            exit 1
          fi
          echo "=== Trigger RPM ==="
          ls -lh "$RPM_FILE"
          rpm -qpl "$RPM_FILE" | grep -q 'joblens-trigger.service' \
            && echo "✅ 包含 systemd unit" \
            || { echo "❌ 缺少 systemd unit"; exit 1; }
          rpm -qpl "$RPM_FILE" | grep -q '/venv/bin/gunicorn' \
            && echo "✅ 包含 venv gunicorn" \
            || { echo "❌ 缺少 gunicorn"; exit 1; }
          echo "✅ Trigger 构建完成"

      - name: 上传 Trigger RPM
        uses: actions/upload-artifact@v4
        with:
          name: trigger-rpm
          path: ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm
          if-no-files-found: error
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # Job 4: 创建 GitHub Release
  #   汇总所有构建产物，生成 SHA256 校验和，发布 Release
  #   Release Notes 中同时展示 JobLens 核心和 Trigger 的版本
  # ════════════════════════════════════════════════════════════
  release:
    name: 创建 GitHub Release
    needs: [prepare, build-core, build-trigger]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整 git 历史（用于 Release Notes）

      - name: Download core packages (all distros)
        uses: actions/download-artifact@v4
        with:
          pattern: core-packages-*
          path: release-assets
          merge-multiple: true

      - name: 下载 Trigger RPM
        uses: actions/download-artifact@v4
        with:
          name: trigger-rpm
          path: release-assets

      - name: 列出发布产物
        working-directory: release-assets
        run: |
          echo "=== 发布产物列表 ==="
          ls -lh

      - name: 生成 SHA256 校验和
        working-directory: release-assets
        run: |
          sha256sum *.{rpm,tar.gz} 2>/dev/null > SHA256SUMS.txt
          echo "=== SHA256 校验和 ==="
          cat SHA256SUMS.txt

      - name: 生成 Release Notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CURRENT_TAG="${GITHUB_REF_NAME}"

          # 读取 Trigger 独立版本号
          TRIGGER_VERSION=$(python3 -c "import runpy; ns=runpy.run_path('trigger/version.py'); print(ns['__version__'])")

          {
            echo "# JobLens ${VERSION}"
            echo ""
            echo "| 组件 | 版本 | 说明 |"
            echo "|------|------|------|"
            echo "| JobLens 核心 | ${VERSION} | C++ 高性能作业监控 Agent |"
            echo "| Trigger 服务 | ${TRIGGER_VERSION} |  API 网关 |"
            echo ""

            # 尝试从 CHANGELOG.md 提取当前版本变更摘要
            if [ -f CHANGELOG.md ]; then
              echo "## 变更摘要"
              echo ""
              awk "/^## v${VERSION}/{found=1; next} /^## v/{if(found) exit} found" CHANGELOG.md | head -60
              echo ""
            fi

            # 查找上一个 tag，生成 commit 列表
            PREV_TAG=$(git tag --sort=-v:refname | grep '^ver-' | grep -B1 "^${CURRENT_TAG}$" | head -1 | grep -v "^${CURRENT_TAG}$" || true)
            if [ -n "${PREV_TAG}" ]; then
              echo "## 提交记录 (${PREV_TAG} → ${CURRENT_TAG})"
              echo ""
              git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD" | head -50
              echo ""
            fi

            echo ""
            echo "## 安装"
            echo ""
            echo '### C++ 核心 (RHEL/Fedora)'
            echo '```bash'
            echo "sudo rpm -ivh joblens-${VERSION}-*.rpm"
            echo "sudo systemctl status joblens"
            echo '```'
            echo ""
            echo '### C++ 核心 (通用 TGZ)'
            echo '```bash'
            echo "tar -xzf JobLens-${VERSION}-Linux.tar.gz"
            echo "cd usr && sudo cp -r . /"
            echo '```'
            echo ""
            echo "| Package | Description |"
            echo "|---------|-------------|"
            echo "| jobLens-${VERSION}-Linux.tar.gz | Core binary + config + systemd unit (portable TGZ) |"
            echo "| joblens-${VERSION}-1.*.x86_64.rpm (x2) | Core RPM for RHEL 9 / Fedora (systemd-managed) |"
            echo "| joblens-trigger-${TRIGGER_VERSION}-*.rpm | Trigger REST API service RPM (Flask + Gunicorn) |"
            echo "| SHA256SUMS.txt | Checksums for integrity verification |"
            echo ""
            echo '### 校验完整性'
            echo '```bash'
            echo "sha256sum -c SHA256SUMS.txt"
            echo '```'
          } > RELEASE_NOTES.md

          echo "=== Release Notes 预览 ==="
          cat RELEASE_NOTES.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "JobLens ${{ needs.prepare.outputs.version }}"
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          append_body: true
          files: |
            release-assets/*.rpm
            release-assets/*.tar.gz
            release-assets/SHA256SUMS.txt
          draft: ${{ inputs.draft || false }}
          prerelease: false
          fail_on_unmatched_files: true
