name: Release

on:
  push:
    tags:
      - 'ver-[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release (review before publishing)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 200M

jobs:
  prepare:
    name: Version check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          # project() spans two lines in CMakeLists.txt, join them first
          CMAKE_VERSION=$(tr '\n' ' ' < CMakeLists.txt | grep -oP 'project\(JobLens\s+VERSION\s+\K[\d.]+')
          echo "CMake version: ${CMAKE_VERSION}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#ver-}"
            echo "Tag version: ${TAG_VERSION}"
            echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"

            if [ "${TAG_VERSION}" != "${CMAKE_VERSION}" ]; then
              echo "::error::Tag version (${TAG_VERSION}) != CMakeLists.txt (${CMAKE_VERSION})"
              echo "::error::Update CMakeLists.txt VERSION to match the tag before releasing"
              exit 1
            fi
            echo "Version check passed (tag)"
          else
            echo "version=${CMAKE_VERSION}" >> "${GITHUB_OUTPUT}"
            echo "Manual trigger mode, version from CMakeLists.txt: ${CMAKE_VERSION}"
          fi

  build-core:
    name: Build Unified RPM (${{ matrix.target.name }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: fedora, image: fedora:latest }
          - { name: el9,   image: almalinux:9 }
      fail-fast: false
    container:
      image: ${{ matrix.target.image }}
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build unified RPM (core + trigger)
        run: bash scripts/build-unified-rpm.sh --install-deps

      # ════════════════════════════════════════════════════════
      # 二进制诊断（从 rpmbuild BUILD 目录）
      # ════════════════════════════════════════════════════════
      - name: Diagnose binary dependencies
        run: |
          set -e
          BUILD_DIR=$(ls -d ~/rpmbuild/BUILD/JobLens-*/build | head -1)
          echo "Build dir: ${BUILD_DIR}"

          echo "=== 二进制动态链接 ==="
          ldd "${BUILD_DIR}/JobLens" | sort

          echo ""
          echo "=== 二进制需要的 glibc 符号版本 ==="
          objdump -T "${BUILD_DIR}/JobLens" | grep -oP 'GLIBC_\S+' | sort -Vu

          echo ""
          echo "=== 二进制需要的 libstdc++ 符号版本 ==="
          objdump -T "${BUILD_DIR}/JobLens" | grep -oP 'GLIBCXX_\S+' | sort -Vu

          echo ""
          echo "=== 二进制需要的第三方库 SONAME ==="
          objdump -p "${BUILD_DIR}/JobLens" | grep NEEDED | sort -u

      # ════════════════════════════════════════════════════════
      # TGZ 便携包制作（从 rpmbuild BUILDROOT 安装树）
      # ════════════════════════════════════════════════════════
      - name: Create portable TGZ
        run: |
          set -e
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILDROOT=$(ls -d ~/rpmbuild/BUILDROOT/joblens-${VERSION}-*.x86_64 2>/dev/null | head -1)
          if [ -z "${BUILDROOT}" ]; then
            echo "Missing rpmbuild BUILDROOT for version ${VERSION}"
            find ~/rpmbuild/BUILDROOT -maxdepth 1 -type d -print 2>/dev/null || true
            exit 1
          fi

          TGZ_NAME="joblens-${VERSION}-Linux-x86_64-${{ matrix.target.name }}.tar.gz"
          mkdir -p build
          tar -czf "build/${TGZ_NAME}" -C "${BUILDROOT}" .
          ls -lh "build/${TGZ_NAME}"

      # ════════════════════════════════════════════════════════
      # 统一 RPM 验证（含 core + trigger 全套产物）
      # ════════════════════════════════════════════════════════
      - name: Verify unified RPM
        run: |
          set -e
          RPM=$(ls ~/rpmbuild/RPMS/x86_64/joblens-*.rpm 2>/dev/null | head -1)
          echo "=== Unified RPM ==="
          ls -lh "$RPM"

          # Core 产物检查
          rpm -qpl "$RPM" | grep -q '/bin/JobLens$' && echo "OK: JobLens binary" || { echo "FAIL: missing JobLens"; exit 1; }
          rpm -qpl "$RPM" | grep -q '/lib/joblens/bpf_obj/' && echo "OK: eBPF objects" || { echo "FAIL: missing bpf_obj"; exit 1; }
          rpm -qpl "$RPM" | grep -q '/etc/JobLens/config.yaml$' && echo "OK: core config" || { echo "FAIL: missing core config"; exit 1; }
          rpm -qpl "$RPM" | grep -q '/joblens.service$' && echo "OK: core systemd unit" || { echo "FAIL: missing core systemd unit"; exit 1; }

          # Trigger 产物检查
          rpm -qpl "$RPM" | grep -q '/trigger-venv/' && echo "OK: trigger venv" || { echo "FAIL: missing trigger venv"; exit 1; }
          rpm -qpl "$RPM" | grep -q '/joblens-trigger.service$' && echo "OK: trigger systemd unit" || { echo "FAIL: missing trigger systemd unit"; exit 1; }
          rpm -qpl "$RPM" | grep -q '/etc/JobLens/trigger/config.yaml$' && echo "OK: trigger config" || { echo "FAIL: missing trigger config"; exit 1; }

          # 系统依赖检查（统一包使用 JOBLENS_BUNDLE_LIBS=OFF）
          REQS=$(rpm -qp --requires "$RPM")
          echo "$REQS" | grep -q 'leveldb' && echo "OK: Requires leveldb" || { echo "FAIL: missing leveldb dep"; exit 1; }
          echo "$REQS" | grep -q 'xxhash' && echo "OK: Requires xxhash" || { echo "FAIL: missing xxhash dep"; exit 1; }

          # 确认旧包替换声明
          echo "$REQS" | grep -q 'joblens-trigger' && echo "OK: Obsoletes/Provides old trigger" || echo "WARN: no old trigger replacement"

          echo "Unified RPM verification passed"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-rpm-${{ matrix.target.name }}
          path: ~/rpmbuild/RPMS/x86_64/joblens-*.rpm
          if-no-files-found: error
          retention-days: 7

      - name: Upload TGZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-tgz-${{ matrix.target.name }}
          path: build/joblens-*-Linux-x86_64-*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [prepare, build-core]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Download unified packages (all distros)
        uses: actions/download-artifact@v4
        with:
          pattern: unified-*
          path: release-assets
          merge-multiple: true

      - name: List assets
        working-directory: release-assets
        run: ls -lh

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: |
          sha256sum *.{rpm,tar.gz} 2>/dev/null > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          {
            echo "## Packages"
            echo ""
            echo "| Package | Description |"
            echo "|---------|-------------|"
            echo "| joblens-${VERSION}-Linux-x86_64-*.tar.gz | Unified install tree TGZ from RPM BUILDROOT |"
            echo "| joblens-${VERSION}-1.*.x86_64.rpm | Unified RPM (core C++ Agent + Python Trigger Gateway, systemd-managed) |"
            echo "| SHA256SUMS.txt | Checksums for integrity verification |"
            echo ""
            echo "## Verify"
            echo '```bash'
            echo "sha256sum -c SHA256SUMS.txt"
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('ver-{0}', needs.prepare.outputs.version) }}
          name: "JobLens ${{ needs.prepare.outputs.version }}"
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          append_body: true
          files: |
            release-assets/*.rpm
            release-assets/*.tar.gz
            release-assets/SHA256SUMS.txt
          draft: ${{ inputs.draft || false }}
          prerelease: false
          fail_on_unmatched_files: true
