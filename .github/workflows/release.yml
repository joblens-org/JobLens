name: Release

on:
  push:
    tags:
      - 'ver-[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release (review before publishing)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 200M

jobs:
  prepare:
    name: Version check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          # project() spans two lines in CMakeLists.txt, join them first
          CMAKE_VERSION=$(tr '\n' ' ' < CMakeLists.txt | grep -oP 'project\(JobLens\s+VERSION\s+\K[\d.]+')
          echo "CMake version: ${CMAKE_VERSION}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#ver-}"
            echo "Tag version: ${TAG_VERSION}"
            echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"

            if [ "${TAG_VERSION}" != "${CMAKE_VERSION}" ]; then
              echo "::error::Tag version (${TAG_VERSION}) != CMakeLists.txt (${CMAKE_VERSION})"
              echo "::error::Update CMakeLists.txt VERSION to match the tag before releasing"
              exit 1
            fi
            echo "Version check passed (tag)"
          else
            echo "version=${CMAKE_VERSION}" >> "${GITHUB_OUTPUT}"
            echo "Manual trigger mode, version from CMakeLists.txt: ${CMAKE_VERSION}"
          fi

  build-core:
    name: Build Core (${{ matrix.target.name }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: fedora, image: fedora:latest, preset: rpm-system-deps }
          - { name: el9,   image: almalinux:9,   preset: rpm-system-deps }
          - { name: fedora-static-epel, image: fedora:latest, preset: rpm-static-epel }
      fail-fast: false
    container:
      image: ${{ matrix.target.image }}
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          dnf install -y sudo
          bash scripts/install-deps.sh
          dnf install -y rpm-build

      - name: Diagnose build environment versions
        run: |
          echo "=== 容器信息 ==="
          cat /etc/os-release | head -5

          echo ""
          echo "=== glibc 版本 ==="
          ldd --version | head -1
          strings /lib64/libc.so.6 | grep 'GLIBC_' | sort -V | tail -5

          echo ""
          echo "=== GCC/libstdc++ 版本 ==="
          gcc --version | head -1
          strings /lib64/libstdc++.so.6 | grep 'GLIBCXX_' | sort -V | tail -5

          echo ""
          echo "=== 关键包版本 ==="
          rpm -q glibc gcc gcc-c++ fmt-devel spdlog-devel yaml-cpp-devel boost-devel 2>/dev/null || true

          echo ""
          echo "=== EPEL 仓库 URL ==="
          grep -r 'baseurl\|mirrorlist' /etc/yum.repos.d/*epel* 2>/dev/null | head -20 || echo "无 EPEL 仓库配置"

          echo ""
          echo "=== 所有已启用的 DNF 仓库 ==="
          dnf repolist --enabled 2>/dev/null || microdnf repolist --enabled 2>/dev/null || true

      - name: Configure
        run: |
          DIST_TAG=$(rpm -E '%{?dist}' 2>/dev/null || echo '')
          echo "Dist tag: ${DIST_TAG}"
          cmake --preset ${{ matrix.target.preset }} -DCPACK_RPM_PACKAGE_RELEASE="1${DIST_TAG}"

      - name: Build
        run: cmake --build --preset ${{ matrix.target.preset }}

      - name: Diagnose binary dependencies
        run: |
          echo "=== 二进制动态链接 ==="
          ldd build/JobLens | sort

          echo ""
          echo "=== 二进制需要的 glibc 符号版本 ==="
          objdump -T build/JobLens | grep -oP 'GLIBC_\S+' | sort -Vu

          echo ""
          echo "=== 二进制需要的 libstdc++ 符号版本 ==="
          objdump -T build/JobLens | grep -oP 'GLIBCXX_\S+' | sort -Vu

          echo ""
          echo "=== 二进制需要的第三方库 SONAME ==="
          objdump -p build/JobLens | grep NEEDED | sort -u

      - name: Package (CPack TGZ + RPM)
        run: cpack --preset ${{ matrix.target.preset }}

      # ════════════════════════════════════════════════════════
      # TGZ 验证（仅 rpm-system-deps 产出 TGZ）
      # ════════════════════════════════════════════════════════
      - name: Verify TGZ contents
        if: matrix.target.preset == 'rpm-system-deps'
        run: |
          set -e
          echo "=== TGZ ==="
          TGZ=$(ls build/joblens-*-Linux-x86_64.tar.gz | head -1)
          ls -lh "$TGZ"

          tar -tzf "$TGZ" | grep -q 'bin/JobLens$' && echo "OK: JobLens binary" || { echo "FAIL: missing JobLens"; exit 1; }
          tar -tzf "$TGZ" | grep -qE 'lib[0-9]*/joblens/bpf_obj/[^/]*\.bpf\.o$' && echo "OK: eBPF objects" || { echo "FAIL: missing bpf_obj"; exit 1; }
          tar -tzf "$TGZ" | grep -q 'etc/JobLens/config.yaml$' && echo "OK: config" || { echo "FAIL: missing config"; exit 1; }
          ! tar -tzf "$TGZ" | grep -qE 'lib[0-9]*/joblens/[^/]*\.so' && echo "OK: no bundled .so (system-deps)" || { echo "FAIL: should not bundle .so"; exit 1; }

      # ════════════════════════════════════════════════════════
      # RPM 通用检查
      # ════════════════════════════════════════════════════════
      - name: Verify RPM (common checks)
        run: |
          set -e
          echo "=== RPM ==="
          RPM=$(ls build/joblens-*.rpm 2>/dev/null | head -1)
          ls -lh "$RPM"

          rpm -qpl "$RPM" | grep -q '/bin/JobLens$' && echo "OK: JobLens binary" || { echo "FAIL: missing JobLens"; exit 1; }
          rpm -qpl "$RPM" | grep -qE '/lib[0-9]*/joblens/bpf_obj/[^/]*\.bpf\.o$' && echo "OK: eBPF objects" || { echo "FAIL: missing bpf_obj"; exit 1; }
          rpm -qpl "$RPM" | grep -q '/etc/JobLens/config.yaml$' && echo "OK: config" || { echo "FAIL: missing config"; exit 1; }

          echo "RPM_FILE=${RPM}" >> "${GITHUB_ENV}"

      # ════════════════════════════════════════════════════════
      # RPM 系统依赖模式专项检查
      # ════════════════════════════════════════════════════════
      - name: Verify RPM (system-deps mode)
        if: matrix.target.preset == 'rpm-system-deps'
        run: |
          set -e
          RPM="${RPM_FILE}"
          REQS=$(rpm -qp --requires "$RPM")

          ! rpm -qpl "$RPM" | grep -qE '/lib[0-9]*/joblens/[^/]*\.so' && echo "OK: no bundled .so" || { echo "FAIL: should not bundle .so"; exit 1; }
          echo "$REQS" | grep -q 'leveldb' && echo "OK: Requires leveldb" || { echo "FAIL: missing leveldb dep"; exit 1; }
          echo "$REQS" | grep -q 'xxhash' && echo "OK: Requires xxhash" || { echo "FAIL: missing xxhash dep"; exit 1; }

      # ════════════════════════════════════════════════════════
      # RPM 自包含模式专项检查
      # ════════════════════════════════════════════════════════
      - name: Verify RPM (static-epel mode)
        if: matrix.target.preset == 'rpm-static-epel'
        run: |
          set -e
          RPM="${RPM_FILE}"
          REQS=$(rpm -qp --requires "$RPM")

          rpm -qpl "$RPM" | grep -qE '/lib[0-9]*/joblens/[^/]*\.so' && echo "OK: bundled .so (self-contained)" || { echo "FAIL: missing bundled .so"; exit 1; }
          echo "$REQS" | grep -q 'leveldb' && { echo "FAIL: leveldb should be statically linked, not in Requires"; exit 1; } || echo "OK: no leveldb in Requires"
          echo "$REQS" | grep -q 'xxhash' && { echo "FAIL: xxhash should be statically linked, not in Requires"; exit 1; } || echo "OK: no xxhash in Requires"

      - name: Verify complete
        run: echo "Core build completed"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-packages-${{ matrix.target.name }}
          path: build/joblens-*.rpm
          if-no-files-found: error
          retention-days: 7

      - name: Upload TGZ artifact
        if: matrix.target.preset == 'rpm-system-deps'
        uses: actions/upload-artifact@v4
        with:
          name: core-tgz-${{ matrix.target.name }}
          path: build/joblens-*-Linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-trigger:
    name: Build Trigger RPM
    needs: prepare
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM build tools
        run: |
          dnf install -y --setopt=tsflags=nodocs \
            rpm-build rpmdevtools python3 python3-devel \
            python3-setuptools python3-wheel python3-pip \
            pyproject-rpm-macros systemd-rpm-macros

      - name: Show trigger version
        run: |
          echo "Trigger version (from trigger/version.py):"
          python3 -c "import runpy; ns=runpy.run_path('trigger/version.py'); print(ns['__version__'])"

      - name: Build Trigger RPM
        run: bash scripts/build-trigger-rpm.sh --install-deps

      - name: Verify trigger artifacts
        run: |
          RPM_FILE=$(ls ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm 2>/dev/null | head -1)
          if [ -z "$RPM_FILE" ]; then
            echo "FAIL: trigger RPM not found"
            exit 1
          fi
          echo "=== Trigger RPM ==="
          ls -lh "$RPM_FILE"
          rpm -qpl "$RPM_FILE" | grep -q 'joblens-trigger.service' \
            && echo "OK: systemd unit" \
            || { echo "FAIL: missing systemd unit"; exit 1; }
          rpm -qpl "$RPM_FILE" | grep -q '/venv/bin/gunicorn' \
            && echo "OK: venv gunicorn" \
            || { echo "FAIL: missing gunicorn"; exit 1; }
          echo "Trigger build completed"

      - name: Upload trigger RPM
        uses: actions/upload-artifact@v4
        with:
          name: trigger-rpm
          path: ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [prepare, build-core, build-trigger]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Download core packages (all distros)
        uses: actions/download-artifact@v4
        with:
          pattern: core-*
          path: release-assets
          merge-multiple: true

      - name: Download trigger RPM
        uses: actions/download-artifact@v4
        with:
          name: trigger-rpm
          path: release-assets

      - name: List assets
        working-directory: release-assets
        run: ls -lh

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: |
          sha256sum *.{rpm,tar.gz} 2>/dev/null > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TRIGGER_VERSION=$(python3 -c "import runpy; ns=runpy.run_path('trigger/version.py'); print(ns['__version__'])")

          {
            echo "## Packages"
            echo ""
            echo "| Package | Description |"
            echo "|---------|-------------|"
            echo "| jobLens-${VERSION}-Linux.tar.gz | Core binary + config + systemd unit (portable TGZ) |"
            echo "| joblens-${VERSION}-1.*.x86_64.rpm (x3) | Core RPM for RHEL 9 / Fedora (systemd-managed, + self-contained) |"
            echo "| joblens-trigger-${TRIGGER_VERSION}-*.rpm | Trigger REST API service RPM (Flask + Gunicorn) |"
            echo "| SHA256SUMS.txt | Checksums for integrity verification |"
            echo ""
            echo "## Verify"
            echo '```bash'
            echo "sha256sum -c SHA256SUMS.txt"
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('ver-{0}', needs.prepare.outputs.version) }}
          name: "JobLens ${{ needs.prepare.outputs.version }}"
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          append_body: true
          files: |
            release-assets/*.rpm
            release-assets/*.tar.gz
            release-assets/SHA256SUMS.txt
          draft: ${{ inputs.draft || false }}
          prerelease: false
          fail_on_unmatched_files: true
