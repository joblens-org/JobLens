name: Release

on:
  push:
    tags:
      - 'ver-[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release (review before publishing)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 200M

jobs:
  prepare:
    name: Version check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          # project() spans two lines in CMakeLists.txt, join them first
          CMAKE_VERSION=$(tr '\n' ' ' < CMakeLists.txt | grep -oP 'project\(JobLens\s+VERSION\s+\K[\d.]+')
          echo "CMake version: ${CMAKE_VERSION}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#ver-}"
            echo "Tag version: ${TAG_VERSION}"
            echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"

            if [ "${TAG_VERSION}" != "${CMAKE_VERSION}" ]; then
              echo "::error::Tag version (${TAG_VERSION}) != CMakeLists.txt (${CMAKE_VERSION})"
              echo "::error::Update CMakeLists.txt VERSION to match the tag before releasing"
              exit 1
            fi
            echo "Version check passed (tag)"
          else
            echo "version=${CMAKE_VERSION}" >> "${GITHUB_OUTPUT}"
            echo "Manual trigger mode, version from CMakeLists.txt: ${CMAKE_VERSION}"
          fi

  build-core:
    name: Build Core (${{ matrix.target.name }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: fedora, image: fedora:latest, dist: .fc41 }
          - { name: el9,   image: almalinux:9,   dist: .el9  }
      fail-fast: false
    container:
      image: ${{ matrix.target.image }}
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          dnf install -y sudo
          bash scripts/install-deps.sh
          dnf install -y rpm-build

      - name: Configure
        run: |
          cmake --preset rpm-system-deps -DCPACK_RPM_PACKAGE_RELEASE="1${{ matrix.target.dist }}"

      - name: Build
        run: cmake --build --preset rpm-system-deps

      - name: Package (CPack TGZ + RPM)
        run: cpack --preset rpm-system-deps

      - name: Verify core artifacts
        run: |
          set -e
          echo "=== TGZ ==="
          ls -lh build/joblens-*-Linux-x86_64.tar.gz
          echo "=== RPM ==="
          ls -lh build/joblens-*.rpm

          tar -tzf build/joblens-*-Linux-x86_64.tar.gz | grep -q 'bin/JobLens$' \
            && echo "OK: JobLens binary" \
            || { echo "FAIL: missing JobLens binary"; exit 1; }

          tar -tzf build/joblens-*-Linux-x86_64.tar.gz | grep -q 'etc/JobLens/config.yaml$' \
            && echo "OK: default config" \
            || { echo "FAIL: missing config.yaml"; exit 1; }

          echo "Core build completed"

      - name: Upload core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-packages-${{ matrix.target.name }}
          path: |
            build/joblens-*-Linux-x86_64.tar.gz
            build/joblens-*.rpm
          if-no-files-found: error
          retention-days: 7

  build-trigger:
    name: Build Trigger RPM
    needs: prepare
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM build tools
        run: |
          dnf install -y --setopt=tsflags=nodocs \
            rpm-build rpmdevtools python3 python3-devel \
            python3-setuptools python3-wheel python3-pip \
            pyproject-rpm-macros systemd-rpm-macros

      - name: Show trigger version
        run: |
          echo "Trigger version (from trigger/version.py):"
          python3 -c "import runpy; ns=runpy.run_path('trigger/version.py'); print(ns['__version__'])"

      - name: Build Trigger RPM
        run: bash scripts/build-trigger-rpm.sh --install-deps

      - name: Verify trigger artifacts
        run: |
          RPM_FILE=$(ls ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm 2>/dev/null | head -1)
          if [ -z "$RPM_FILE" ]; then
            echo "FAIL: trigger RPM not found"
            exit 1
          fi
          echo "=== Trigger RPM ==="
          ls -lh "$RPM_FILE"
          rpm -qpl "$RPM_FILE" | grep -q 'joblens-trigger.service' \
            && echo "OK: systemd unit" \
            || { echo "FAIL: missing systemd unit"; exit 1; }
          rpm -qpl "$RPM_FILE" | grep -q '/venv/bin/gunicorn' \
            && echo "OK: venv gunicorn" \
            || { echo "FAIL: missing gunicorn"; exit 1; }
          echo "Trigger build completed"

      - name: Upload trigger RPM
        uses: actions/upload-artifact@v4
        with:
          name: trigger-rpm
          path: ~/rpmbuild/RPMS/x86_64/joblens-trigger-*.rpm
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [prepare, build-core, build-trigger]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Download core packages (all distros)
        uses: actions/download-artifact@v4
        with:
          pattern: core-packages-*
          path: release-assets
          merge-multiple: true

      - name: Download trigger RPM
        uses: actions/download-artifact@v4
        with:
          name: trigger-rpm
          path: release-assets

      - name: List assets
        working-directory: release-assets
        run: ls -lh

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: |
          sha256sum *.{rpm,tar.gz} 2>/dev/null > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TRIGGER_VERSION=$(python3 -c "import runpy; ns=runpy.run_path('trigger/version.py'); print(ns['__version__'])")

          {
            echo "## Packages"
            echo ""
            echo "| Package | Description |"
            echo "|---------|-------------|"
            echo "| jobLens-${VERSION}-Linux.tar.gz | Core binary + config + systemd unit (portable TGZ) |"
            echo "| joblens-${VERSION}-1.*.x86_64.rpm (x2) | Core RPM for RHEL 9 / Fedora (systemd-managed) |"
            echo "| joblens-trigger-${TRIGGER_VERSION}-*.rpm | Trigger REST API service RPM (Flask + Gunicorn) |"
            echo "| SHA256SUMS.txt | Checksums for integrity verification |"
            echo ""
            echo "## Verify"
            echo '```bash'
            echo "sha256sum -c SHA256SUMS.txt"
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('ver-{0}', needs.prepare.outputs.version) }}
          name: "JobLens ${{ needs.prepare.outputs.version }}"
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          append_body: true
          files: |
            release-assets/*.rpm
            release-assets/*.tar.gz
            release-assets/SHA256SUMS.txt
          draft: ${{ inputs.draft || false }}
          prerelease: false
          fail_on_unmatched_files: true
