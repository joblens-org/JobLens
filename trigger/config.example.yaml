# ============================================================================
# JobLens Trigger Configuration
# ============================================================================
# Trigger service configuration

service:
  host: 0.0.0.0
  port: 7592

# Service registry configuration
service_registry:
  enabled: true  # Whether to enable service registration
  url: "http://your-registry-host:8080"  # Registry center URL (supports REGISTRY_URL env var override)
  retry_interval: 10  # Retry interval on registration failure (seconds)
  max_retries: 3  # Maximum retry attempts
  heartbeat_interval: 1800  # Heartbeat interval (seconds), default 30 minutes

# Configuration manager
config_manager:
  enabled: false
  config_file: "/etc/JobLens/config.yaml"  # Configuration file path
  etcd_priority: false # IHEP uses Puppet for configuration management

# Rule manager
rule_manager:
  enabled: false
  etcd_priority: true  # Whether etcd has priority (true: etcd changes override local; false: local changes take effect)

# RPC client configuration
lens_config:
  rpc_timeout: 5.0  # RPC timeout (seconds)

# Email notification configuration (sensitive info read from environment variables)
email_notifier:
  smtp_server: "smtp.example.com"  # SMTP server, overridden by EMAIL_SMTP_SERVER env var
  smtp_port: 587                   # SMTP port, overridden by EMAIL_SMTP_PORT env var
  use_tls: true                    # Whether to enable TLS, overridden by EMAIL_USE_TLS env var
  sender_email: ""                 # Sender email, set by EMAIL_SENDER env var
  recipients: []                   # Recipient list (comma-separated), set by EMAIL_RECIPIENTS env var
