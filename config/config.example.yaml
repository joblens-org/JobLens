# JobLens minimal configuration example
#
# This is a template — copy to config.yaml and modify for your environment.
# Full configuration reference: https://github.com/joblens-org/JobLens/blob/main/doc/configuration.md
#
# Start command: ./JobLens -m service -c config/config.yaml

# ============================================================
# Core Configuration (required)
# ============================================================
lens_config:
  rpc_socket_path: /var/JobLens/rpc.sock   # UNIX Domain Socket path for RPC communication
  lock_path: /var/JobLens/JobLens.lock     # Process lock file to prevent multiple instances
  max_collector_threads: 4                   # Thread pool size for collector scheduler
  log_level: info                            # Log level: trace/debug/info/warn/error/critical/off

# ============================================================
# Job Registry Configuration
# ============================================================
job_registry_config:
  job_db_path: /var/JobLens/job.db          # LevelDB database directory for job persistence

# ============================================================
# Collector Configuration — cpumem only
# ============================================================
collectors_config:
  enable_collector_perf: false               # Disable collector performance counters
  perf_window_size: 1000                     # Required when enable_collector_perf=true
  default_freq: 1                            # Default sampling frequency (Hz)
  default_use_writers:                       # Default writer list, used when collector doesn't specify
    - file_writer
  collectors:
    - name: cpumem_collector
      type: CPUMemCollector
      config: cpumem_collector_config

cpumem_collector_config:
  freq: 1                                    # Sample once per second
  summary: false                             # false = per-process, true = aggregate summary
  use_writers:
    - file_writer                            # Output to local file

# ============================================================
# Writer Configuration — FileWriter only
# ============================================================
writers_config:
  enable_writer_perf: false                  # Disable writer performance counters
  buffer_capacity: 1024                      # Internal ring buffer capacity
  writers:
    - name: file_writer
      type: FileWriter
      config: file_writer_config

file_writer_config:
  path: /var/log/joblens/output.log          # Default output file path (required)
  # --- Optional controls (all have defaults, shown below are the defaults) ---
  # write_mode: append                       # Write mode: 'append' (default) or 'overwrite'
  # flush_on_shutdown: true                  # Flush remaining records on graceful shutdown
  # enable_rotation: false                   # Enable size-based file rotation (append mode only)
  # max_file_size_bytes: 104857600           # Rotation threshold in bytes (100 MB)
  # max_files: 5                             # Maximum rotated files to retain
  # --- Collector-to-file routing (optional; parser output is written as plain text) ---
  # outputs: []                              # Empty or omitted means all collectors use 'path'
  # outputs:
  #   - collector_name: cpumem_collector
  #     file_path: /var/log/joblens/cpumem.log
